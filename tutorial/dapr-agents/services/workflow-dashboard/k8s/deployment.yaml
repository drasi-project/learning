apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-dashboard-state
  namespace: default
data:
  state.yaml: |
    apiVersion: dapr.io/v1alpha1
    kind: Component
    metadata:
      name: statestore
      namespace: default
    spec:
      type: state.redis
      version: v1
      metadata:
      - name: redisHost
        value: workflow-redis.default.svc.cluster.local:6379
      - name: redisPassword
        value: ""
      - name: keyPrefix
        value: "none"
      - name: actorStateStore
        value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-dashboard
  template:
    metadata:
      labels:
        app: workflow-dashboard
    spec:
      containers:
      - name: workflow-dashboard
        image: ghcr.io/diagridio/diagrid-dashboard:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: COMPONENT_FILE
          value: /app/components/state.yaml
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: state-component
          mountPath: /app/components
          readOnly: true
      volumes:
      - name: state-component
        configMap:
          name: workflow-dashboard-state
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-dashboard
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: workflow-dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workflow-dashboard
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: workflow-dashboard
            port:
              number: 80
