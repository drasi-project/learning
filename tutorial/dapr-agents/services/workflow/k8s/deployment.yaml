apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow
  labels:
    app: workflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow
  template:
    metadata:
      labels:
        app: workflow
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "workflow"
        dapr.io/enable-api-logging: "true"
        dapr.io/log-level: "info"
    spec:
      containers:
      - name: workflow
        image: ghcr.io/drasi-project/learning/dapr-agents/workflow-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DAPR_STORE_NAME
          value: "workflow-store"
        - name: DAPR_PUBSUB_NAME
          value: "workflow-pubsub"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
