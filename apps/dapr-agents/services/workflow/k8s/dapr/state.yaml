apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: workflow-state
  namespace: default
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: workflow-redis.default.svc.cluster.local:6379
  - name: redisPassword
    value: ""
  - name: keyPrefix
    value: "none"
  - name: actorStateStore
    value: "true"
